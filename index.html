<style>
  :root {
    --sky: #8ECDEB;
    --red: #C8342A;
    --white: #FDF6EC;
    --rope-light: #D9C49C;
    --rope-dark: #BFA275;
    --rope-line: #8A6F45;
    --ink: #3A2A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--sky);
    font-family: 'Ultra', system-ui, serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── Rope nav ──────────────────────────────────────────── */
  nav.rope-nav {
    position: relative;
    padding-top: 10px;
  }

  /* ── Hero ─────────────────────────────────────────────── */
  header.hero {
    text-align: center;
    padding: clamp(2rem, 7vh, 5rem) 1rem 1rem;
    position: relative;
  }
  h1.title {
    font-family: 'Rye', serif;
    font-size: clamp(4rem, 16vw, 11rem);
    color: var(--white);
    text-shadow: 6px 6px 0 var(--red);
    line-height: 0.95;
    letter-spacing: 0.02em;
  }
  p.tagline {
    font-family: 'Ultra', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: var(--red);
    margin-top: 1.2rem;
    letter-spacing: 0.08em;
  }

  /* ── Under-hero field ── */
  .pasture {
    text-align: center;
    margin: 1.5rem auto 0;
  }
  .fill-red   { fill: var(--red); }
  .fill-white { fill: var(--white); }

  /* ── Font specimen strip (temporary — pick one, then I delete this) ── */
  section.specimens {
    background: rgba(253, 246, 236, 0.55);
    border-top: 4px dashed var(--red);
    margin-top: 3rem;
    padding: 2rem 1rem 3rem;
    text-align: center;
  }
  section.specimens h2 {
    font-family: 'Ultra', serif;
    color: var(--red);
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .specimen { margin: 1.1rem 0; }
  .specimen .word {
    font-size: clamp(2.2rem, 7vw, 4rem);
    color: var(--white);
    text-shadow: 3px 3px 0 var(--red);
    line-height: 1.1;
  }
  .specimen .label {
    font-family: system-ui, sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  footer {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
    font-family: 'Sancreek', serif;
    color: var(--white);
    text-shadow: 1px 1px 0 var(--red);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
