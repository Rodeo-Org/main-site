<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YEEHAW!!</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Sancreek&family=Ultra&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #8ECDEB;
    --red: #C8342A;
    --white: #FDF6EC;
    --rope-light: #D9C49C;
    --rope-dark: #BFA275;
    --rope-line: #8A6F45;
    --ink: #3A2A1A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    position: relative;
    background: var(--sky);
    font-family: 'Ultra', system-ui, serif;
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ── Rope nav ──────────────────────────────────────────── */
  nav.rope-nav {
    position: relative;
    padding-top: 10px;
  }

  /* ── Hero ─────────────────────────────────────────────── */
  header.hero {
    text-align: center;
    padding: clamp(2rem, 7vh, 5rem) 1rem 1rem;
    position: relative;
  }
  h1.title {
    font-family: 'Rye', serif;
    font-size: clamp(4rem, 16vw, 11rem);
    color: var(--white);
    text-shadow: 6px 6px 0 var(--red);
    line-height: 0.95;
    letter-spacing: 0.02em;
  }
  p.tagline {
    font-family: 'Ultra', serif;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: var(--red);
    margin-top: 1.2rem;
    letter-spacing: 0.08em;
  }

  /* ── Under-hero field ── */
  .pasture {
    text-align: center;
    margin: 1.5rem auto 0;
  }
  .fill-red   { fill: var(--red); }
  .fill-white { fill: var(--white); }

  /* ── Font specimen strip (temporary — pick one, then I delete this) ── */
  section.specimens {
    background: rgba(253, 246, 236, 0.55);
    border-top: 4px dashed var(--red);
    margin-top: 3rem;
    padding: 2rem 1rem 3rem;
    text-align: center;
  }
  section.specimens h2 {
    font-family: 'Ultra', serif;
    color: var(--red);
    font-size: 1.2rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .specimen { margin: 1.1rem 0; }
  .specimen .word {
    font-size: clamp(2.2rem, 7vw, 4rem);
    color: var(--white);
    text-shadow: 3px 3px 0 var(--red);
    line-height: 1.1;
  }
  .specimen .label {
    font-family: system-ui, sans-serif;
    font-size: 0.8rem;
    color: var(--ink);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .side-shog { position: absolute; z-index: 0; }
  @media (max-width: 900px) { .side-shog { display: none; } }

  footer {
    text-align: center;
    padding: 2rem 1rem 2.5rem;
    font-family: 'Sancreek', serif;
    color: var(--white);
    text-shadow: 1px 1px 0 var(--red);
    font-size: 1.05rem;
    letter-spacing: 0.1em;
  }
</style>
</head>

<header class="hero">
  <h1 class="title">RODEO</h1>
  <p class="tagline">A hackathon unconference</p>
</header>

<!-- Under the hero: the bull rider, centered -->
<div class="pasture" aria-hidden="true">
  <img src="assets/bull-rider-red.png" alt="" style="width:clamp(220px,32vw,400px);">
</div>

<!-- The Posse -->
<section id="posse" style="max-width:1100px; margin:4rem auto 0; padding:0 1rem; text-align:center;">
  <h2 style="font-family:'Rye',serif; font-size:clamp(2.2rem,7vw,4rem); color:var(--white); text-shadow:4px 4px 0 var(--red);">THE POSSE</h2>
  <style>
    .posse-row { display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-end; gap:2.2rem; margin-top:2rem; }
    .posse-card { display:flex; flex-direction:column; align-items:center; gap:0.4rem; }
    .posse-card img { width:clamp(140px,18vw,220px); }
    .posse-card .pname { font-family:'Ultra',serif; font-size:1.35rem; color:var(--white); text-shadow:2px 2px 0 var(--red); letter-spacing:0.05em; }
    .posse-card .phandle { font-family:system-ui,sans-serif; font-size:0.95rem; }
    .posse-card .phandle a { color:var(--red); text-decoration:none; font-weight:600; }
    .posse-card .phandle a:hover { text-decoration:underline; }
  </style>
  <div class="posse-row">
    <figure class="posse-card">
      <img src="assets/cow-braids-full.png" alt="Bradie">
      <figcaption><div class="pname">Bradie</div><div class="phandle"><a href="https://x.com/mudscryer">@mudscryer</a></div></figcaption>
    </figure>
    <figure class="posse-card">
      <img src="assets/cow-blueprint-full.png" alt="Max">
      <figcaption><div class="pname">Max</div><div class="phandle"><a href="https://x.com/hexstellation">@hexstellation</a></div></figcaption>
    </figure>
    <figure class="posse-card">
      <img src="assets/cow-cap-full.png" alt="Naut">
      <figcaption><div class="pname">Naut</div><div class="phandle"><a href="https://x.com/hahacomputer">@hahacomputer</a></div></figcaption>
    </figure>
    <figure class="posse-card">
      <img src="assets/cow-beard-full.png" alt="Tony">
      <figcaption><div class="pname">Tony</div><div class="phandle"><a href="https://x.com/ntonio_enzo">@ntonio_enzo</a></div></figcaption>
    </figure>
    <figure class="posse-card">
      <img src="assets/cow-grumpy-full.png" alt="Michael" style="transform:scaleX(-1);">
      <figcaption><div class="pname">Michael</div><div class="phandle"><a href="https://x.com/timebard">@timebard</a></div></figcaption>
    </figure>
  </div>
</section>



<!-- When: per the Election of Times -->
<section id="when" style="max-width:900px; margin:4.5rem auto 0; padding:0 1rem; text-align:center;">
  <h2 style="font-family:'Rye',serif; font-size:clamp(2.2rem,7vw,4rem); color:var(--white); text-shadow:4px 4px 0 var(--red);">WHEN</h2>
  <p style="font-family:'Ultra',serif; color:var(--red); font-size:clamp(1.1rem,2.6vw,1.5rem); margin-top:1.4rem;">
    Thursday, October 15, 2026 &middot; time TBD
  </p>
  <p style="font-family:system-ui,sans-serif; color:var(--ink); font-size:1rem; margin-top:0.5rem;">
    The Inauguration &mdash; Austin, Texas
  </p>
  <p style="font-family:'Ultra',serif; color:var(--red); font-size:clamp(1rem,2.2vw,1.3rem); margin-top:1.2rem;">
    Friday, October 16 &middot; doors TBD
  </p>
  <p style="font-family:system-ui,sans-serif; color:var(--ink); font-size:1rem; margin-top:0.5rem;">
    The Event Proper
  </p>
</section>

<!-- Side shoggoths: small ones haunting the margins -->
<img class="side-shog" src="assets/shog-hoop-left-white.png"  alt="" style="width:84px; left:1.2%; top:780px;">
<img class="side-shog" src="assets/shog-dance-red.png"        alt="" style="width:72px; left:2%;   top:1560px; transform:rotate(-8deg);">
<img class="side-shog" src="assets/shog-hoop-right-red.png"   alt="" style="width:88px; right:1.2%; top:1050px;">
<img class="side-shog" src="assets/shog-dance-white.png"      alt="" style="width:70px; right:2%;  top:1900px; transform:scaleX(-1) rotate(7deg);">

<!-- Bottom corral: horse silhouettes along the page floor -->
<div class="corral" aria-hidden="true" style="position:relative; margin-top:4rem; height:clamp(110px,16vw,190px); overflow:hidden;">
  <img src="assets/horse-graze-red.png"   alt="" style="position:absolute; bottom:0; left:8%;  height:58%; transform:translateX(-50%);">
  <img src="assets/horse-rear-white.png"  alt="" style="position:absolute; bottom:0; left:27%; height:80%; transform:translateX(-50%);">
  <img src="assets/horse-pair-red.png"    alt="" style="position:absolute; bottom:0; left:50%; height:86%; transform:translateX(-50%) scaleX(-1);">
  <img src="assets/horse-rear-white.png"  alt="" style="position:absolute; bottom:0; left:73%; height:80%; transform:translateX(-50%) scaleX(-1);">
  <img src="assets/horse-graze-red.png"   alt="" style="position:absolute; bottom:0; left:92%; height:58%; transform:translateX(-50%) scaleX(-1);">
</div>

<footer>rodeo.baby &mdash; yeehaw est. 2026</footer>

</html>
